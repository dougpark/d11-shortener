<!DOCTYPE html>
<html lang="en">

<!-- station.html -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station — Lumin</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        g: { blue: '#4285F4', black: '#1F1F1F', gray: '#474747', border: '#E3E3E3', surface: '#FFFFFF' }
                    },
                    fontFamily: { sans: ['Inter', 'Roboto', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .card-glow {
            transition: box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .card-glow:hover {
            box-shadow: 0 0 0 2px #4285F4, 0 8px 28px rgba(66, 133, 244, 0.12);
            border-color: #4285F4 !important;
        }

        .spinner {
            border: 2px solid #E3E3E3;
            border-top-color: #4285F4;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-[#F0F2F5] font-sans text-g-black antialiased min-h-screen">

    <!-- ── Nav ── -->
    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-g-border">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center gap-3">
            <a href="/" class="flex-shrink-0">
                <img src="/lumin_logo.png" alt="Lumin" class="h-8 w-auto">
            </a>
            <span class="text-g-border select-none">|</span>
            <h1 id="page-title" class="text-sm font-semibold text-g-black flex-1 capitalize">Station</h1>
            <!-- Mine / All toggle -->
            <div class="flex items-center rounded-full border border-g-border bg-[#F8F9FA] p-0.5 gap-0.5 flex-shrink-0">
                <button id="btn-mine" onclick="setMode('personal')"
                    class="flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    Mine
                </button>
                <button id="btn-all" onclick="setMode('community')"
                    class="flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zM3 20v-2a3 3 0 015.356-1.857" />
                    </svg>
                    All
                </button>
            </div>
            <a href="/" title="Back to dashboard"
                class="flex items-center gap-1.5 text-xs text-g-gray hover:text-g-blue transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                Dashboard
            </a>
        </div>
    </header>

    <!-- ── Loading ── -->
    <div id="loading" class="flex items-center justify-center py-40">
        <div class="spinner"></div>
    </div>

    <!-- ── Empty state ── -->
    <div id="empty" class="hidden text-center py-40 px-6">
        <div class="w-16 h-16 bg-blue-50 rounded-[16px] flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-g-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
        </div>
        <p class="font-semibold text-g-black mb-1">No bookmarks found</p>
        <p class="text-sm text-g-gray">No bookmarks tagged <span id="empty-tag"
                class="font-mono text-g-blue">#station</span> found.</p>
        <a href="/" class="mt-6 inline-block text-sm text-g-blue hover:underline">← Back to Dashboard</a>
    </div>

    <!-- ── Card grid ── -->
    <main id="grid" class="hidden max-w-7xl mx-auto px-6 py-8">
        <div id="card-grid" class="grid gap-4" style="grid-template-columns: repeat(auto-fill, minmax(260px, 1fr))">
        </div>
    </main>

    <!-- ── Detail modal ── -->
    <div id="detail-backdrop"
        class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm hidden items-center justify-center p-4"
        onclick="closeDetail()">
        <div id="detail-modal" class="bg-white rounded-[20px] shadow-2xl w-full max-w-md p-6 flex flex-col gap-4"
            onclick="event.stopPropagation()">
            <div class="flex items-start gap-3">
                <div id="d-favicon" class="flex-shrink-0 mt-0.5"></div>
                <div class="flex-1 min-w-0">
                    <h2 id="d-title" class="font-semibold text-g-black text-base leading-snug"></h2>
                    <a id="d-url" href="#" target="_blank" rel="noopener noreferrer"
                        class="text-xs text-g-blue hover:underline truncate block mt-0.5"></a>
                </div>
                <button onclick="closeDetail()"
                    class="flex-shrink-0 p-1 text-g-gray hover:text-g-black transition-colors rounded">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <p id="d-desc" class="text-sm text-g-gray leading-relaxed hidden"></p>
            <div id="d-ai-summary-wrap" class="hidden bg-blue-50 rounded-[12px] p-3">
                <p class="text-[10px] font-semibold text-g-blue uppercase tracking-wider mb-1">AI Summary</p>
                <p id="d-ai-summary" class="text-xs text-g-black leading-relaxed"></p>
            </div>
            <div id="d-tags-wrap" class="hidden flex-wrap gap-1.5 flex"></div>
            <div class="flex items-center justify-between text-[11px] text-g-gray border-t border-g-border pt-3">
                <span id="d-saved"></span>
                <span id="d-hits"></span>
            </div>
            <a id="d-open-btn" href="#" target="_blank" rel="noopener noreferrer"
                class="block text-center text-sm font-semibold text-white bg-g-blue hover:bg-blue-600 transition-colors rounded-[10px] py-2">
                Open link ↗
            </a>
        </div>
    </div>

    <script>
        function qs(sel) { return document.querySelector(sel) }
        function showEl(id) { qs('#' + id)?.classList.remove('hidden') }
        function hideEl(id) { qs('#' + id)?.classList.add('hidden') }
        function decodeHtml(s) {
            const ta = document.createElement('textarea')
            ta.innerHTML = String(s ?? '')
            return ta.value
        }
        function escHtml(s) {
            const d = decodeHtml(s)
            return d.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        }

        // Extract tag from path: /v/station → "station"
        const pathParts = location.pathname.replace(/\/+$/, '').split('/')
        const dashboardTag = pathParts[pathParts.length - 1] || 'station'
        const displayName = dashboardTag.charAt(0).toUpperCase() + dashboardTag.slice(1)

        // Mutable mode — toggled in-place without a page reload
        let currentMode = new URLSearchParams(location.search).has('community') ? 'community' : 'personal'

        function applyMode() {
            const isCommunity = currentMode === 'community'
            const modeSuffix = isCommunity ? ' · Community' : ' · Personal'
            document.title = displayName + modeSuffix + ' — Lumin'
            qs('#page-title').textContent = displayName + modeSuffix
            qs('#empty-tag').textContent = '#' + dashboardTag

            // URL stays in sync so bookmarking/sharing works
            const cleanUrl = location.pathname + (isCommunity ? '?community' : '')
            history.replaceState(null, '', cleanUrl)

            // Pill highlight
            const activeClass = 'flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full transition-colors bg-white text-g-blue shadow-sm'
            const inactiveClass = 'flex items-center gap-1 text-xs font-semibold px-2.5 py-1 rounded-full transition-colors text-g-gray hover:text-g-black'
            qs('#btn-mine').className = isCommunity ? inactiveClass : activeClass
            qs('#btn-all').className = isCommunity ? activeClass : inactiveClass
        }

        function setMode(mode) {
            if (mode === currentMode) return
            currentMode = mode
            applyMode()
            init()
        }

        // Apply initial state on load
        applyMode()

        // ── Bookmark detail modal ─────────────────────────────────────────────
        let allBookmarks = {}

        function openDetail(id) {
            const b = allBookmarks[id]
            if (!b) return
            const modal = qs('#detail-modal')

            // Favicon
            const faviconEl = qs('#d-favicon')
            faviconEl.innerHTML = faviconHtml(b, 'w-8 h-8 rounded-[8px]')

            // Core fields
            qs('#d-title').textContent = decodeHtml(b.title || b.url)
            const urlEl = qs('#d-url')
            urlEl.href = b.url
            urlEl.textContent = b.url

            // Description
            const descEl = qs('#d-desc')
            if (b.short_description) {
                descEl.textContent = decodeHtml(b.short_description)
                descEl.classList.remove('hidden')
            } else {
                descEl.classList.add('hidden')
            }

            // AI Summary
            const aiWrap = qs('#d-ai-summary-wrap')
            if (b.ai_summary) {
                qs('#d-ai-summary').textContent = decodeHtml(b.ai_summary)
                aiWrap.classList.remove('hidden')
            } else {
                aiWrap.classList.add('hidden')
            }

            // Tags
            const tagsWrap = qs('#d-tags-wrap')
            let tags = []
            try { tags = JSON.parse(b.tag_list || '[]') } catch { }
            let aiTags = []
            try { aiTags = JSON.parse(b.ai_tags || '[]') } catch { }
            const userTagsHtml = tags.map(t =>
                `<span class="bg-[#F3F4F6] text-g-gray text-xs px-2 py-0.5 rounded-full">#${escHtml(t)}</span>`
            ).join('')
            const aiTagsHtml = aiTags.map(t =>
                `<span class="bg-purple-50 text-purple-600 text-xs px-2 py-0.5 rounded-full border border-purple-100">✦ ${escHtml(t)}</span>`
            ).join('')
            if (userTagsHtml || aiTagsHtml) {
                tagsWrap.innerHTML = userTagsHtml + aiTagsHtml
                tagsWrap.classList.remove('hidden')
            } else {
                tagsWrap.classList.add('hidden')
            }

            // Meta
            qs('#d-saved').textContent = b.created_at
                ? 'Saved ' + new Date(b.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
                : ''
            qs('#d-hits').textContent = b.hit_count > 0 ? b.hit_count + ' click' + (b.hit_count !== 1 ? 's' : '') : 'Never opened'

            // Open button
            qs('#d-open-btn').href = b.url

            // Show
            const backdrop = qs('#detail-backdrop')
            backdrop.classList.remove('hidden')
            backdrop.classList.add('flex')
            document.body.style.overflow = 'hidden'
        }

        function closeDetail() {
            const backdrop = qs('#detail-backdrop')
            backdrop.classList.add('hidden')
            backdrop.classList.remove('flex')
            document.body.style.overflow = ''
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail() })

        // ── Favicon renderer ──────────────────────────────────────────────────
        function makeFallbackIcon(letter, sizeClass = 'w-4 h-4') {
            const span = document.createElement('span')
            span.className = sizeClass + ' bg-blue-100 text-g-blue rounded text-[9px] font-bold flex items-center justify-center flex-shrink-0'
            span.textContent = (letter || '?').toUpperCase()
            return span
        }

        function faviconHtml(b, sizeClass = 'w-4 h-4') {
            const letter = ((b.title || b.url) + '?')[0]
            const escapedLetter = escHtml(letter)
            if (b.favicon_url) {
                return `<img src="${escHtml(b.favicon_url)}" alt="" loading="lazy"
                    class="${sizeClass} rounded object-contain flex-shrink-0"
                    onerror="this.replaceWith(makeFallbackIcon('${escapedLetter}', '${sizeClass}'))">`
            }
            return `<span class="${sizeClass} bg-blue-100 text-g-blue rounded text-[9px] font-bold flex items-center justify-center flex-shrink-0">${escapedLetter.toUpperCase()}</span>`
        }

        // ── Card renderer ─────────────────────────────────────────────────────
        function renderCard(group) {
            const links = group.bookmarks.map(b => {
                allBookmarks[b.id] = b
                return `
                <div class="flex items-center gap-2.5 px-2 py-1.5 -mx-2 rounded-[8px] hover:bg-blue-50 group transition-colors">
                    <button onclick="openDetail(${b.id})" title="View details"
                        class="relative z-10 flex-shrink-0 p-0.5 -m-0.5 hover:scale-110 transition-transform focus:outline-none focus:ring-2 focus:ring-g-blue rounded">
                        ${faviconHtml(b)}
                    </button>
                    <a href="${escHtml(b.url)}" target="_blank" rel="noopener noreferrer"
                       class="flex-1 text-sm text-g-black group-hover:text-g-blue transition-colors leading-snug truncate min-w-0">
                        ${escHtml(b.title || b.url)}
                    </a>
                    ${b.hit_count > 0 ? `<span class="text-[11px] text-g-gray flex-shrink-0 tabular-nums ml-1">${b.hit_count}</span>` : ''}
                </div>`
            }).join('')

            return `
                <div class="bg-white border border-g-border rounded-[20px] p-5 card-glow">
                    <p class="text-[11px] font-semibold text-g-gray uppercase tracking-widest mb-3 leading-none">${escHtml(group.name)}</p>
                    <div class="space-y-0.5">${links}</div>
                </div>`
        }

        // ── Init ──────────────────────────────────────────────────────────────
        async function init() {
            hideEl('grid')
            hideEl('empty')
            showEl('loading')
            allBookmarks = {}
            try {
                const apiUrl = '/api/v/' + encodeURIComponent(dashboardTag) + (currentMode === 'community' ? '?community' : '')
                const res = await fetch(apiUrl)
                hideEl('loading')
                if (!res.ok) { showEl('empty'); return }
                const { groups } = await res.json()
                if (!groups || groups.length === 0) { showEl('empty'); return }
                qs('#card-grid').innerHTML = groups.map(renderCard).join('')
                showEl('grid')
            } catch {
                hideEl('loading')
                showEl('empty')
            }
        }

        init()
    </script>

</body>

</html>
